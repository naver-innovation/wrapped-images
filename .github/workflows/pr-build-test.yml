name: 'pr-build-test'

# PR 에서 <repo>/<tag>/Dockerfile 가 변경되면, 해당 이미지를 amd64 로만
# "빌드만" 해서(push 안 함) Dockerfile 이 실제로 빌드되는지 검증하고, 빌드된 이미지를
# Trivy 로 CVE 스캔(리포트 전용 — PR 을 실패시키지 않고 job summary 에 표로 남김)한다.
# (빌드 실패는 대부분 arch 무관 — 의존성/GPG/ARG 등 — 이라 amd64 단일로 잡는다.
#  arm64 전용 실패는 머지 후 build-and-push-image.yml 에서 양쪽 빌드 시 잡힌다.)
# 빌드 산출물/캐시는 테스트 후(성공/실패 무관) 정리해 자가호스트 ARC 러너 볼륨을 보호한다.
#
# 디렉토리 규칙은 build-and-push-image.yml 과 동일:
#   <registry>/<org>/<image>/<tag>/Dockerfile  (Dockerfile 의 상위 디렉토리명 = tag)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/Dockerfile'

concurrency:
  # 같은 PR 에 새 커밋이 push 되면 진행 중인 이전 빌드 테스트는 취소한다(러너 절약).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 1) PR 이 바꾼 Dockerfile 디렉토리를 찾아 빌드 매트릭스를 생성한다.
  detect:
    runs-on: arc-amd64
    outputs:
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed image directories
        id: detect
        run: |
          set -euo pipefail
          declare -A DIRS

          # 변경 파일이 속한 이미지 디렉토리(= Dockerfile 이 있는 가장 가까운 상위 디렉토리)를 찾는다.
          add_dir_from_file() {
            local f="$1" d
            d=$(dirname "$f")
            while [[ "$d" != "." && "$d" != "/" ]]; do
              if [[ -f "$d/Dockerfile" ]]; then DIRS["$d"]=1; return 0; fi
              d=$(dirname "$d")
            done
          }

          # PR 의 자체 변경분만 대상으로 한다 (merge-base...head, 3-dot).
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          while IFS= read -r f; do add_dir_from_file "$f"; done \
            < <(git diff --name-only "$BASE...$HEAD")

          # 매트릭스 JSON 생성 (jq 의존 없이 직접 구성)
          build_json="["; fb=1
          for d in $(printf '%s\n' "${!DIRS[@]}" | sort); do
            tag="${d##*/}"; image="${d%/*}"
            # PR 검증은 amd64 단일 arch 로만 (머지 빌드와 중복되는 비용 최소화)
            [[ $fb -eq 1 ]] && fb=0 || build_json+=","
            build_json+="{\"dir\":\"$d\",\"image\":\"$image\",\"tag\":\"$tag\",\"arch\":\"amd64\",\"runner\":\"arc-amd64\"}"
          done
          build_json+="]"

          echo "build_matrix=$build_json" >> "$GITHUB_OUTPUT"
          if [[ ${#DIRS[@]} -eq 0 ]]; then
            echo "변경된 이미지 없음 — 빌드 테스트 skip"
          else
            echo "Detected images:"; printf '%s\n' "${!DIRS[@]}" | sort | sed 's/^/  - /'
          fi

  # 2) amd64 네이티브 러너에서 빌드만(push 안 함) 수행하고, 끝나면 항상 정리한다.
  build-test:
    needs: detect
    if: needs.detect.outputs.build_matrix != '[]'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      pull-requests: write   # Trivy CVE 리포트를 PR 코멘트로 게시(upsert)하기 위함
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.build_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/${{ matrix.arch }}

      - name: Log in to Oracle Container Registry
        uses: docker/login-action@v4
        with:
          registry: me-riyadh-1.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build only (${{ matrix.arch }}, no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dir }}
          file: ${{ matrix.dir }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false
          # CVE 스캔을 위해 로컬 docker 데몬에 적재한다 (amd64 단일이라 load 가능).
          load: true
          tags: pr-build-test-candidate:${{ matrix.tag }}
          # main 의 빌드 캐시는 읽어서 속도만 높이고(read-only),
          # 머지 전 PR 이 공유 캐시를 오염시키지 않도록 cache-to 는 쓰지 않는다.
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          provenance: false
          sbom: false

      # 빌드된 이미지의 CVE 를 스캔한다 — 리포트 전용(발견돼도 PR 을 실패시키지 않음).
      # 권위 있는 게이트는 사내 "클라우드 이미지 보안검수"; 여기서는 머지 전 조기 가시성만 제공한다.
      - name: Trivy CVE scan (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true   # DB 다운로드 실패 등 스캔 자체 오류도 PR 을 막지 않도록
        with:
          image-ref: pr-build-test-candidate:${{ matrix.tag }}
          scan-type: image
          format: json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: '0'          # 취약점이 있어도 종료코드 0 (리포트 전용)
          output: trivy-report.json
        env:
          # 러너 영속 볼륨이 아닌 임시 경로에 DB 캐시 (볼륨 보호)
          TRIVY_CACHE_DIR: ${{ runner.temp }}/.trivy

      # Trivy JSON 리포트를 파싱해 (1) CRITICAL/HIGH 카운트 요약, (2) CRITICAL 존재 시
      # promotion 실패 경고, (3) 상세 표를 만들어 PR 코멘트(마커 upsert)와 job summary 에 게시한다.
      - name: Post CVE report as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          IMAGE: ${{ matrix.image }}
          TAG: ${{ matrix.tag }}
        with:
          script: |
            const fs = require('fs');
            const image = process.env.IMAGE, tag = process.env.TAG;

            // Trivy JSON 파싱 (스캔 실패/DB 오류 시 파일이 없을 수 있음)
            let data = null;
            try { data = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8')); } catch (e) {}

            let crit = 0, high = 0;
            const rows = [];
            if (data && Array.isArray(data.Results)) {
              for (const r of data.Results) {
                for (const v of (r.Vulnerabilities || [])) {
                  if (v.Severity === 'CRITICAL') crit++;
                  else if (v.Severity === 'HIGH') high++;
                  rows.push({
                    sev: v.Severity || '',
                    pkg: v.PkgName || (r.Target || ''),
                    id: v.VulnerabilityID || '',
                    installed: v.InstalledVersion || '',
                    fixed: v.FixedVersion || '',
                  });
                }
              }
            }
            const total = rows.length;
            const ord = { CRITICAL: 0, HIGH: 1 };
            rows.sort((a, b) => (ord[a.sev] ?? 9) - (ord[b.sev] ?? 9));

            const marker = `<!-- trivy-cve-report:${image} -->`;
            let body = `${marker}\n### 🔎 Trivy CVE scan — \`${image}:${tag}\` (amd64, report-only)\n\n`;

            if (!data) {
              body += `> ⚠️ 스캔 리포트를 읽지 못했습니다 (스캔 실패 또는 Trivy DB 다운로드 실패) — Actions 로그를 확인하세요.\n`;
            } else {
              body += `**🔴 CRITICAL: ${crit} · 🟠 HIGH: ${high} · 총 ${total}건**\n\n`;
              if (crit > 0) {
                body += `> 🚨 **CRITICAL ${crit}건 발견** — CVE 가 해결된 더 최신 업스트림 버전이 있는지 확인 후, 가능하면 그 버전으로 래핑(태그 상향)하는 것을 권장합니다.\n\n`;
              } else if (total === 0) {
                body += `✅ CRITICAL/HIGH 취약점이 발견되지 않았습니다.\n\n`;
              }
              if (total > 0) {
                const cap = 80;
                const shown = rows.slice(0, cap);
                body += `<details><summary>CRITICAL / HIGH 상세 펼치기 (${total}건)</summary>\n\n`;
                body += `| Severity | Package | CVE | Installed | Fixed |\n|---|---|---|---|---|\n`;
                for (const r of shown) {
                  body += `| ${r.sev} | \`${r.pkg}\` | ${r.id} | ${r.installed} | ${r.fixed || '-'} |\n`;
                }
                if (total > cap) body += `\n... 외 ${total - cap}건 (전체는 Actions 로그 / job summary 참고)\n`;
                body += `\n</details>\n`;
              }
            }
            body += `\n> ⚠️ 리포트 전용 — PR 을 실패시키지 않습니다. 최종 차단 게이트는 사내 클라우드 이미지 보안검수입니다.`;

            // job summary 에도 동일 내용 기록
            try { if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body + '\n'); } catch (e) {}

            // PR 코멘트 upsert (마커로 기존 코멘트 찾아 갱신, 없으면 생성)
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # 성공/실패와 무관하게 러너 볼륨에 남은 빌드 캐시·이미지(적재한 스캔 대상 포함)를 정리한다.
      - name: Clean up build artifacts (always)
        if: always()
        run: |
          docker buildx prune --all --force || true
          docker image prune --all --force || true
